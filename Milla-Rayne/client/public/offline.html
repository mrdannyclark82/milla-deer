<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milla Rayne — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #09090b;
      color: #f4f4f5;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
    }
    .orb {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #a78bfa, #7c3aed 60%, #3b0764);
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.5);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.5); }
      50%       { box-shadow: 0 0 70px rgba(139, 92, 246, 0.8); }
    }
    h1 { font-size: 1.6rem; font-weight: 700; color: #a78bfa; }
    p  { font-size: 1rem; color: #a1a1aa; text-align: center; max-width: 320px; line-height: 1.6; }
    button {
      margin-top: 0.5rem;
      padding: 0.65rem 1.6rem;
      border: none;
      border-radius: 9999px;
      background: #7c3aed;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="orb"></div>
  <h1>Milla Rayne</h1>
  <p>You're offline. Reconnect to continue chatting.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
