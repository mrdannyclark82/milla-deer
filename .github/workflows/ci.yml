name: CI
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run workspace check
        run: npm run check

      - name: Run workspace lint
        run: npm run lint

      - name: Run smoke tests
        run: npm test

      - name: Build backend bundles
        run: npm run build
